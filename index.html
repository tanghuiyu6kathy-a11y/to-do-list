<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办清单 - Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            color: #999;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        #todoInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
            min-width: 150px;
        }

        #todoInput:focus {
            border-color: #667eea;
        }

        #todoCategory {
            padding: 12px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
            cursor: pointer;
            color: #333;
            background: white;
            font-weight: 500;
        }

        #todoCategory:focus {
            border-color: #667eea;
        }

        #todoCategory option {
            color: #333;
            font-weight: 500;
        }

        #todoDeadline {
            padding: 12px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
            cursor: pointer;
            color: #666;
        }

        #todoDeadline:focus {
            border-color: #667eea;
        }

        #todoDeadline::placeholder {
            color: #ccc;
        }

        #addBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e8e8e8;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .category-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
        }

        .category-badge.work {
            background: #e8eeff;
            color: #667eea;
        }

        .category-badge.life {
            background: #ffe8f0;
            color: #c2185b;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9ff;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f1ff;
            transform: translateX(4px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .checkbox:hover {
            background: #667eea;
            transform: scale(1.1);
        }

        .todo-item.completed .checkbox {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .checkbox::after {
            content: '';
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.3s;
        }

        .todo-item.completed .checkbox::after {
            transform: rotate(45deg) scale(1);
        }

        .todo-text {
            flex: 1;
            font-size: 14px;
            color: #333;
            word-break: break-all;
            transition: all 0.3s;
        }

        .todo-time {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .deadline {
            color: #667eea;
            font-weight: 500;
        }

        .countdown {
            display: inline-block;
            padding: 4px 8px;
            background: #f0f1ff;
            border-radius: 4px;
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
        }

        .countdown.urgent {
            background: #ffe8e8;
            color: #ff6b6b;
        }

        .countdown.overdue {
            background: #ff6b6b;
            color: white;
        }

        .delete-btn {
            width: 28px;
            height: 28px;
            background: #ff6b6b;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e8e8e8;
            font-size: 12px;
            color: #999;
        }

        .stats span {
            flex: 1;
            text-align: center;
        }

        .stats strong {
            display: block;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-bottom: 4px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-group {
                flex-wrap: wrap;
            }

            #todoInput {
                padding: 10px 12px;
                font-size: 14px;
                flex: 0 1 100%;
            }

            #todoCategory {
                padding: 10px 8px;
                font-size: 13px;
                flex: 0 1 auto;
                min-width: 80px;
            }

            #todoDeadline {
                padding: 10px 8px;
                font-size: 12px;
                flex: 1 1 auto;
                min-width: 100px;
            }

            #addBtn {
                padding: 10px 14px;
                font-size: 14px;
                flex: 0 0 auto;
            }

            .tabs {
                margin-bottom: 15px;
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 14px;
                font-size: 13px;
            }

            .todo-item {
                padding: 12px 14px;
            }

            .category-badge {
                font-size: 10px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📝 我的待办清单</h1>
                <p>输入事项、选择截止时间，实时倒计时提醒</p>
            </div>

            <div class="input-group">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="输入新的待办事项..."
                    autocomplete="off"
                >
                <select id="todoCategory">
                    <option value="work">工作</option>
                    <option value="life">生活</option>
                </select>
                <input
                    type="datetime-local"
                    id="todoDeadline"
                    title="完成时间"
                    step="3600"
                >
                <button id="addBtn">添加</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('all')">
                    📋 全部
                </button>
                <button class="tab-btn" onclick="switchTab('work')">
                    💼 工作
                </button>
                <button class="tab-btn" onclick="switchTab('life')">
                    🎯 生活
                </button>
            </div>

            <div class="todo-list" id="todoList"></div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
                <p>还没有待办事项，开始添加吧！</p>
            </div>

            <div class="stats">
                <span>
                    <strong id="totalCount">0</strong>
                    总数
                </span>
                <span>
                    <strong id="completedCount">0</strong>
                    已完成
                </span>
                <span>
                    <strong id="remainingCount">0</strong>
                    未完成
                </span>
            </div>
        </div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const todoCategory = document.getElementById('todoCategory');
        const todoDeadline = document.getElementById('todoDeadline');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const emptyState = document.getElementById('emptyState');
        const totalCount = document.getElementById('totalCount');
        const completedCount = document.getElementById('completedCount');
        const remainingCount = document.getElementById('remainingCount');

        // 从 localStorage 加载待办列表
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentTab = 'all';

        // 初始化
        renderTodos();
        updateStats();

        // 处理日期选择器 - 限制只显示小时，分钟始终为 00
        todoDeadline.addEventListener('change', () => {
            if (todoDeadline.value) {
                // 强制将分钟设置为 00
                let dateValue = todoDeadline.value;
                if (dateValue.includes(':')) {
                    const parts = dateValue.split(':');
                    if (parts.length >= 2) {
                        parts[1] = '00'; // 设置分钟为 00
                        todoDeadline.value = parts.join(':');
                    }
                }
            }
        });

        // 每秒更新倒计时
        setInterval(() => {
            updateCountdowns();
        }, 1000);

        // 添加待办事项
        addBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        function addTodo() {
            const text = todoInput.value.trim();
            if (text === '') {
                alert('请输入待办事项');
                return;
            }

            const category = todoCategory.value || 'work';
            let deadline = todoDeadline.value;

            // 确保分钟为 00
            if (deadline) {
                const parts = deadline.split(':');
                if (parts.length >= 2) {
                    parts[1] = '00';
                    deadline = parts.join(':');
                }
            }

            const todo = {
                id: Date.now(),
                text: text,
                category: category,
                completed: false,
                deadline: deadline || null,
                createdAt: new Date().toLocaleString()
            };

            todos.unshift(todo);
            saveTodos();
            renderTodos();
            updateStats();
            todoInput.value = '';
            todoCategory.value = 'work';
            todoDeadline.value = '';
            todoInput.focus();
        }

        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
            updateStats();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderTodos();
        }

        function calculateCountdown(deadline) {
            if (!deadline) return null;

            const now = new Date();
            const deadlineDate = new Date(deadline);
            const diff = deadlineDate - now;

            if (diff < 0) {
                return {
                    text: '已逾期',
                    type: 'overdue',
                    days: 0,
                    hours: 0,
                    minutes: 0,
                    seconds: 0
                };
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            let text = '';
            if (days > 0) {
                text = `还剩 ${days}天 ${hours}小时`;
            } else if (hours > 0) {
                text = `还剩 ${hours}小时 ${minutes}分钟`;
            } else if (minutes > 0) {
                text = `还剩 ${minutes}分钟`;
            } else {
                text = `还剩 ${seconds}秒`;
            }

            const type = hours <= 1 ? 'urgent' : 'normal';

            return { text, type, days, hours, minutes, seconds };
        }

        function formatDeadline(deadline) {
            if (!deadline) return null;
            const date = new Date(deadline);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            return `${month}-${day} ${hours}:00`;
        }

        function getCategoryLabel(category) {
            return category === 'work' ? '工作' : '生活';
        }

        function renderTodos() {
            todoList.innerHTML = '';

            // 根据当前 tab 过滤待办
            let filtered = todos;
            if (currentTab !== 'all') {
                filtered = todos.filter(t => t.category === currentTab);
            }

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            filtered.forEach(todo => {
                const li = document.createElement('div');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.id = `todo-${todo.id}`;

                const countdown = calculateCountdown(todo.deadline);
                const deadlineDisplay = formatDeadline(todo.deadline);

                let timeHtml = '';
                if (deadlineDisplay) {
                    timeHtml = `
                        <div class="todo-time">
                            <div class="deadline">📅 ${deadlineDisplay}</div>
                            <div class="countdown ${countdown?.type || ''}" data-id="${todo.id}">
                                ${countdown?.text || '未设置截止时间'}
                            </div>
                        </div>
                    `;
                }

                const categoryLabel = getCategoryLabel(todo.category);
                const categoryBadgeClass = todo.category === 'work' ? 'work' : 'life';

                li.innerHTML = `
                    <div class="checkbox" onclick="toggleTodo(${todo.id})"></div>
                    <div style="flex: 1;">
                        <div class="todo-text">
                            <span class="category-badge ${categoryBadgeClass}">${categoryLabel}</span>
                            ${escapeHtml(todo.text)}
                        </div>
                        ${timeHtml}
                    </div>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">×</button>
                `;
                todoList.appendChild(li);
            });
        }

        function updateCountdowns() {
            let filtered = todos;
            if (currentTab !== 'all') {
                filtered = todos.filter(t => t.category === currentTab);
            }

            filtered.forEach(todo => {
                const element = document.querySelector(`#todo-${todo.id} .countdown`);
                if (element && todo.deadline) {
                    const countdown = calculateCountdown(todo.deadline);
                    element.textContent = countdown?.text || '未设置截止时间';
                    element.className = `countdown ${countdown?.type || ''}`;
                }
            });
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const remaining = total - completed;

            totalCount.textContent = total;
            completedCount.textContent = completed;
            remainingCount.textContent = remaining;
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
